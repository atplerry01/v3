global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "whycespace-platform"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["platform:8080"]
        labels:
          service: "whycespace-platform"

  - job_name: "kafka"
    static_configs:
      - targets: ["kafka:9092"]
        labels:
          service: "kafka"

  - job_name: "redis"
    static_configs:
      - targets: ["redis-exporter:9121"]
        labels:
          service: "redis"

  - job_name: "postgres"
    static_configs:
      - targets: ["postgres-exporter:9187"]
        labels:
          service: "postgres"
