apiVersion: apps/v1
kind: Deployment
metadata:
  name: whycespace-api-gateway
  namespace: whycespace
  labels:
    app: whycespace-api-gateway
    tier: platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: whycespace-api-gateway
  template:
    metadata:
      labels:
        app: whycespace-api-gateway
        tier: platform
    spec:
      containers:
        - name: api-gateway
          image: ghcr.io/whycespace/whycespace-platform:latest
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: ASPNETCORE_URLS
              value: "http://+:8080"
            - name: ConnectionStrings__Postgres
              valueFrom:
                secretKeyRef:
                  name: whycespace-secrets
                  key: postgres-connection
            - name: ConnectionStrings__Redis
              valueFrom:
                secretKeyRef:
                  name: whycespace-secrets
                  key: redis-connection
            - name: Kafka__BootstrapServers
              value: "kafka:9092"
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /dev/engines
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /dev/engines
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: whycespace-api-gateway
  namespace: whycespace
  labels:
    app: whycespace-api-gateway
spec:
  type: ClusterIP
  selector:
    app: whycespace-api-gateway
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
      name: http
